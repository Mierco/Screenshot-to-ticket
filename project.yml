name: ScreenshotToTicketApp
options:
  deploymentTarget:
    iOS: 16.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.iagentur.screenshottoticket
    SWIFT_VERSION: 5.0
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: HSYHBF5UDF
targets:
  ScreenshotToTicketApp:
    type: application
    platform: iOS
    sources:
      - ScreenshotToTicketApp
    postBuildScripts:
      - name: Stamp build metadata
        shell: /bin/sh
        script: |
          set -eu

          BUILD_INFO_PATH="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/BuildInfo.json"

          if git -C "${SRCROOT}" rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            BUILD_NUMBER="$(git -C "${SRCROOT}" rev-list --count HEAD)"
            COMMIT_SHA="$(git -C "${SRCROOT}" rev-parse --short HEAD)"
          else
            BUILD_NUMBER="${CURRENT_PROJECT_VERSION:-1}"
            COMMIT_SHA="unknown"
          fi

          cat > "${BUILD_INFO_PATH}" <<EOF
          {"buildNumber":"${BUILD_NUMBER}","gitCommitSHA":"${COMMIT_SHA}"}
          EOF
    info:
      path: ScreenshotToTicketApp/Info.plist
      properties:
        CFBundleDisplayName: ScreenshotToTicket
        UILaunchScreen: {}
        NSPhotoLibraryUsageDescription: Needed to pick screenshots to attach to Jira issues.
    settings:
      base:
        INFOPLIST_FILE: ScreenshotToTicketApp/Info.plist
        PRODUCT_NAME: ScreenshotToTicketApp
        TARGETED_DEVICE_FAMILY: 1
    scheme:
      testTargets: []
